<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AA — Registrasi. Buat akun baru Anda.">
  <title>AA — Registrasi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth-style.css">
  <style>
    /* ── Spinner animasi ── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Input error state ── */
    .form-group.has-error input {
      border-color: #e74c3c !important;
      box-shadow: 0 0 0 3px rgba(231, 76, 60, .12);
    }
    .form-group .field-error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }
    .form-group.has-error .field-error {
      display: block;
    }
  </style>
</head>

<body>

  <nav id="navbar" class="auth-nav">
    <a href="dashboard.html" class="nav-logo">AA</a>
    <div class="nav-links">
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Buat Akun</h1>
      <p class="subtitle">Daftarkan diri Anda untuk mulai mengelola portofolio</p>

      <!-- Pesan sukses -->
      <div class="success-msg" id="successMessage" style="display:none;"></div>
      <!-- Pesan error umum (dari server) -->
      <div class="general-error" id="generalError" style="display:none;"></div>

      <form id="registerForm" novalidate>
        <!-- Nama -->
        <div class="form-group" id="grpNama">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap" autocomplete="name">
          <span class="field-error" id="namaError"></span>
        </div>

        <!-- Email -->
        <div class="form-group" id="grpEmail">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="nama@upitra.ac.id" autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="form-group" id="grpPassword">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Minimal 8 karakter" autocomplete="new-password">
          <label class="show-password">
            <input type="checkbox" id="showPassword"> Tampilkan password
          </label>
          <span class="field-error" id="passwordError"></span>
        </div>

        <!-- Konfirmasi Password -->
        <div class="form-group" id="grpConfirm">
          <label for="confirmPassword">Konfirmasi Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Ulangi password" autocomplete="new-password">
          <label class="show-password">
            <input type="checkbox" id="showConfirmPassword"> Tampilkan password
          </label>
          <span class="field-error" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Daftar</button>
      </form>

      <div class="auth-footer">Sudah punya akun? <a href="login.html">Masuk di sini</a></div>
    </div>
  </div>

  <footer>
    <div class="footer-bottom">&copy; 2025 AA. All rights reserved.</div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // ── Guard: jika sudah login, langsung ke dashboard ──
      try {
        if (localStorage.getItem('token')) {
          window.location.replace('dashboard.html');
          return;
        }
      } catch (e) { /* private/incognito mode */ }

      // ── Elemen DOM ──
      const form                = document.getElementById('registerForm');
      const namaInput           = document.getElementById('nama');
      const emailInput          = document.getElementById('email');
      const passwordInput       = document.getElementById('password');
      const confirmInput        = document.getElementById('confirmPassword');
      const submitBtn           = document.getElementById('submitBtn');
      const successMsg          = document.getElementById('successMessage');
      const generalError        = document.getElementById('generalError');

      // ── Toggle show/hide password ──
      document.getElementById('showPassword').addEventListener('change', e => {
        passwordInput.type = e.target.checked ? 'text' : 'password';
      });
      document.getElementById('showConfirmPassword').addEventListener('change', e => {
        confirmInput.type = e.target.checked ? 'text' : 'password';
      });

      // ── Clear error saat user mengetik ──
      namaInput.addEventListener('input',    () => clearError('grpNama',     'namaError'));
      emailInput.addEventListener('input',   () => clearError('grpEmail',    'emailError'));
      passwordInput.addEventListener('input', () => {
        clearError('grpPassword', 'passwordError');
        // re-validasi konfirmasi jika sudah diisi
        if (confirmInput.value) {
          if (passwordInput.value !== confirmInput.value) {
            setError('grpConfirm', 'confirmPasswordError', 'Password tidak sama');
          } else {
            clearError('grpConfirm', 'confirmPasswordError');
          }
        }
      });
      confirmInput.addEventListener('input', () => clearError('grpConfirm',  'confirmPasswordError'));

      // ── Submit handler ──
      form.addEventListener('submit', async e => {
        e.preventDefault();

        // Sembunyikan pesan sebelumnya
        hideGeneral();

        // Validasi — kumpulkan semua error dulu
        const nama            = namaInput.value.trim();
        const email           = emailInput.value.trim();
        const password        = passwordInput.value;
        const confirmPassword = confirmInput.value;
        let valid = true;

        // Nama
        if (!nama) {
          setError('grpNama', 'namaError', 'Nama lengkap wajib diisi');
          valid = false;
        } else {
          clearError('grpNama', 'namaError');
        }

        // Email
        if (!email) {
          setError('grpEmail', 'emailError', 'Email wajib diisi');
          valid = false;
        } else if (!email.toLowerCase().endsWith('@upitra.ac.id')) {
          setError('grpEmail', 'emailError', 'Email harus menggunakan domain @upitra.ac.id');
          valid = false;
        } else {
          clearError('grpEmail', 'emailError');
        }

        // Password
        if (!password) {
          setError('grpPassword', 'passwordError', 'Password wajib diisi');
          valid = false;
        } else if (password.length < 8) {
          setError('grpPassword', 'passwordError', 'Password minimal 8 karakter');
          valid = false;
        } else {
          clearError('grpPassword', 'passwordError');
        }

        // Konfirmasi
        if (!confirmPassword) {
          setError('grpConfirm', 'confirmPasswordError', 'Konfirmasi password wajib diisi');
          valid = false;
        } else if (password !== confirmPassword) {
          setError('grpConfirm', 'confirmPasswordError', 'Password tidak sama');
          valid = false;
        } else {
          clearError('grpConfirm', 'confirmPasswordError');
        }

        if (!valid) return; // Berhenti di sini, error sudah tampil

        // ── Kirim ke server ──
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Memproses...';

        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nama, email, password, confirmPassword })
          });
          const data = await res.json();

          if (data.success) {
            successMsg.textContent = '✓ Registrasi berhasil! Mengalihkan ke halaman login...';
            successMsg.style.display = 'block';
            form.reset();
            submitBtn.textContent = '✓ Berhasil!';
            setTimeout(() => { window.location.href = 'login.html'; }, 2000);
          } else {
            // Error dari server (mis. email sudah terdaftar)
            if (data.errors && typeof data.errors === 'object') {
              Object.keys(data.errors).forEach(field => {
                if (field === 'general') {
                  showGeneral(data.errors[field]);
                } else if (field === 'nama') {
                  setError('grpNama', 'namaError', data.errors[field]);
                } else if (field === 'email') {
                  setError('grpEmail', 'emailError', data.errors[field]);
                } else if (field === 'password') {
                  setError('grpPassword', 'passwordError', data.errors[field]);
                } else if (field === 'confirmPassword') {
                  setError('grpConfirm', 'confirmPasswordError', data.errors[field]);
                }
              });
            } else {
              showGeneral(data.message || 'Registrasi gagal. Silakan coba lagi.');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Daftar';
          }
        } catch (err) {
          showGeneral('Tidak dapat terhubung ke server. Periksa koneksi Anda.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Daftar';
        }
      });

      // ── Helper functions ──

      /** Tampilkan error pada field tertentu */
      function setError(groupId, errorId, message) {
        const group = document.getElementById(groupId);
        const span  = document.getElementById(errorId);
        if (group) group.classList.add('has-error');
        if (span)  { span.textContent = message; span.style.display = 'block'; }
      }

      /** Hapus error pada field tertentu */
      function clearError(groupId, errorId) {
        const group = document.getElementById(groupId);
        const span  = document.getElementById(errorId);
        if (group) group.classList.remove('has-error');
        if (span)  { span.textContent = ''; span.style.display = 'none'; }
      }

      /** Tampilkan pesan error umum */
      function showGeneral(msg) {
        generalError.textContent = msg;
        generalError.style.display = 'block';
      }

      /** Sembunyikan pesan error umum & sukses */
      function hideGeneral() {
        generalError.style.display = 'none';
        generalError.textContent = '';
        successMsg.style.display = 'none';
      }
    });
  </script>
</body>

</html>
